name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Show runner IP (for firewall debugging)
        run: curl -s https://api.ipify.org && echo ""

      - name: Test SSH connectivity
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "Attempting SSH to ${{ secrets.SSH_HOST }} as ${{ secrets.SSH_USER }}"
          sshpass -e ssh -v \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            -p 22 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "echo '✅ SSH connection successful'"

      - name: Deploy
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=60 \
            -p 22 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'ENDSSH'
          set -e
          cd /opt/sakbol
          echo "=== git pull ==="
          git pull origin main
          echo "=== docker build + restart ==="
          docker compose -f docker-compose.selfhosted.yml up -d --build --remove-orphans
          echo "=== waiting for healthy ==="
          sleep 15
          docker compose -f docker-compose.selfhosted.yml ps
          echo "=== deploy done ==="
          ENDSSH
